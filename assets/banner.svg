<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <!-- Safari compass icon -->
  <g transform="translate(180, 280)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
    <!-- Compass needle -->
    <line x1="0" y1="-70" x2="0" y2="70" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#58a6ff"/>
    <!-- Arrow tip -->
    <polygon points="-70,0 -55,-8 -55,8" fill="#58a6ff"/>
  </g>

  <!-- AI Agent icon (simplified brain/gear) -->
  <g transform="translate(380, 280)" filter="url(#shadow)">
    <path d="M0,-60 C33,-60 60,-33 60,0 C60,33 33,60 0,60 C-33,60 -60,33 -60,0 C-60,-33 -33,-60 0,-60Z" fill="none" stroke="#3fb950" stroke-width="3"/>
    <path d="M-30,-15 Q0,-35 30,-15" fill="none" stroke="#3fb950" stroke-width="2.5"/>
    <path d="M-30,0 Q0,-20 30,0" fill="none" stroke="#3fb950" stroke-width="2.5"/>
    <path d="M-30,15 Q0,-5 30,15" fill="none" stroke="#3fb950" stroke-width="2.5"/>
    <!-- Connection lines -->
    <line x1="-60" y1="0" x2="-90" y2="0" stroke="#3fb950" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="0" x2="90" y2="0" stroke="#3fb950" stroke-width="2" opacity="0.5"/>
    <circle cx="-90" cy="0" r="4" fill="#3fb950" opacity="0.5"/>
    <circle cx="90" cy="0" r="4" fill="#3fb950" opacity="0.5"/>
  </g>

  <!-- Arrow between them -->
  <g transform="translate(330, 280)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="url(#accent)" stroke-width="3"/>
    <polygon points="45,-8 55,0 45,8" fill="#58a6ff"/>
  </g>

  <!-- Title -->
  <text x="580" y="255" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="56" font-weight="800" fill="white">Safari</text>
  <text x="580" y="310" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="56" font-weight="800" fill="url(#accent)">Web Agent</text>

  <!-- Subtitle -->
  <text x="580" y="365" font-family="PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif" font-size="22" fill="#8b949e">用你真实的 Safari 浏览器做网页自动化</text>

  <!-- Killer features (Chinese) -->
  <g transform="translate(550, 420)">
    <rect x="0" y="0" width="160" height="28" rx="14" fill="#1f6feb" opacity="0.2"/>
    <text x="80" y="19" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle">🔑 真实登录态</text>
  </g>
  <g transform="translate(720, 420)">
    <rect x="0" y="0" width="160" height="28" rx="14" fill="#238636" opacity="0.2"/>
    <text x="80" y="19" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#3fb950" text-anchor="middle">🛡️ 绕过反爬</text>
  </g>
  <g transform="translate(890, 420)">
    <rect x="0" y="0" width="160" height="28" rx="14" fill="#a371f7" opacity="0.2"/>
    <text x="80" y="19" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#a371f7" text-anchor="middle">⌨️ 原生键盘事件</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="40" fill="#161b22" opacity="0.8"/>
  <text x="30" y="585" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#8b949e">Hermes Skill · 仅限 macOS · 零安装（Safari 预装） · 96 个工具 via Safari MCP</text>
  <text x="1170" y="585" font-family="ui-monospace,SFMono-Regular" font-size="13" fill="#58a6ff" text-anchor="end">treyxu23/trey-safari-web-agent</text>
</svg>
