<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" width="740" height="400">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Window chrome -->
  <rect width="740" height="400" rx="10" fill="url(#termBg)"/>
  <rect width="740" height="30" rx="10" fill="#1f2335"/>
  <rect y="20" width="740" height="10" fill="#1f2335"/>
  <circle cx="20" cy="15" r="6" fill="#f7768e"/>
  <circle cx="40" cy="15" r="6" fill="#e0af68"/>
  <circle cx="60" cy="15" r="6" fill="#9ece6a"/>
  <text x="370" y="20" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#565f89" text-anchor="middle">Terminal — hermes</text>

  <!-- Terminal content -->
  <text x="25" y="60" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#9ece6a">$</text>
  <text x="40" y="60" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#c0caf5"> hermes</text>

  <text x="25" y="82" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#7aa2f7">></text>
  <text x="40" y="82" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#c0caf5"> 帮我把 ProductHunt 前 10 个 AI 工具的名字和票数抓出来</text>

  <text x="25" y="110" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#565f89">  safari_navigate("https://producthunt.com/topics/ai")</text>
  <text x="25" y="130" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#9ece6a">  → 页面已加载（已过 Cloudflare）</text>

  <text x="25" y="155" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#565f89">  safari_snapshot()</text>
  <text x="25" y="175" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#9ece6a">  → 找到 24 个工具卡片</text>

  <text x="25" y="200" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#565f89">  safari_scroll("down", 600) × 2</text>
  <text x="25" y="220" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#9ece6a">  → 加载更多...</text>

  <text x="25" y="245" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#565f89">  safari_evaluate(extract_script)</text>
  <text x="25" y="265" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#c0caf5">  [</text>
  <text x="29" y="283" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#c0caf5">    {"name":"Claude Code","votes":"▲2,847","tagline":"AI coding agent"},</text>
  <text x="29" y="301" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#c0caf5">    {"name":"Cursor","votes":"▲2,103","tagline":"AI-first code editor"},</text>
  <text x="29" y="319" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#c0caf5">    {"name":"v0 by Vercel","votes":"▲1,876","tagline":"Generate UI"},</text>
  <text x="29" y="337" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#565f89">    ... 7 more items</text>
  <text x="25" y="355" font-family="SF Mono,Menlo,monospace" font-size="12" fill="#c0caf5">  ]</text>

  <text x="25" y="382" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#9ece6a">  ✅ 10 条数据，8 秒搞定</text>
</svg>
